{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="text-center mb-4">Event Poster Gallery</h2>

<div class="row">

{% for event in events %}

<div class="col-md-3">

<div class="card shadow mb-4">

<img src="{{ url_for('static', filename='uploads/' + event.image) }}" class="card-img-top">

<div class="card-body text-center">

<h6>{{ event.name }}</h6>

<p>{{ event.date }}</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
