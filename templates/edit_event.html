{% extends "base.html" %}

{% block content %}

<div class="container py-5">
    <div class="card shadow-lg border-0 p-4">
        <h2 class="mb-4 text-center">Edit Event</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Event Name</label>
                <input type="text" name="name" class="form-control" value="{{ event.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" required>{{ event.description }}</textarea>
            </div>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ event.date }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="Sports" {% if event.category == "Sports" %}selected{% endif %}>Sports</option>
                        <option value="Tech" {% if event.category == "Tech" %}selected{% endif %}>Tech</option>
                        <option value="Cultural" {% if event.category == "Cultural" %}selected{% endif %}>Cultural</option>
                        <option value="General" {% if event.category == "General" %}selected{% endif %}>General</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Change Image</label>
                    <input type="file" name="image" class="form-control">
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-4">Update Event</button>
            <a href="/admin" class="btn btn-secondary mt-4">Back</a>
        </form>
    </div>
</div>

{% endblock %}
